<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="darkreader-lock" />
  <meta name="color-scheme" content="light only" />
  <title>ready runner one</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23f7f7f7'/%3E%3Cpath fill='%23535353' d='M22 8h25v5h5v18H36v6h9v6H32v8h7v6H22v-6h5v-8H14v6H5v-6h7V32h8v-5h2zM43 15v4h4v-4z'/%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: light only;
      --bg: #f7f7f7;
      --ink: #535353;
      --soft: #8f8f8f;
      --light: #b7b7b7;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Consolas, Monaco, "Courier New", monospace;
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: var(--ink);
      font-family: Consolas, Monaco, "Courier New", monospace;
      letter-spacing: 0.12em;
    }

    .title {
      position: fixed;
      left: clamp(16px, 3vw, 42px);
      top: clamp(14px, 2.2vw, 34px);
      font-size: clamp(17px, 2.1vw, 30px);
      font-weight: 700;
      text-transform: uppercase;
    }

    .goal {
      position: fixed;
      left: 50%;
      top: clamp(14px, 2.2vw, 34px);
      transform: translateX(-50%);
      font-size: clamp(18px, 2.4vw, 36px);
      font-weight: 700;
      text-transform: uppercase;
      border: 2px solid var(--ink);
      padding: 4px 12px 5px;
      background: var(--bg);
    }

    .score {
      position: fixed;
      right: clamp(16px, 3vw, 42px);
      top: clamp(16px, 2.4vw, 38px);
      font-size: clamp(15px, 1.8vw, 25px);
      text-align: right;
      white-space: pre;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: clamp(24px, 4.2vw, 52px);
      transform: translateX(-50%);
      color: #777;
      font-size: clamp(13px, 1.35vw, 19px);
      letter-spacing: 0.18em;
      opacity: 0.78;
      text-align: center;
    }

    .fade {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.08s linear;
      background:
        radial-gradient(circle at 17% 62%, rgba(83, 83, 83, 0.18), transparent 16%),
        radial-gradient(circle at 9% 54%, rgba(83, 83, 83, 0.12), transparent 10%),
        linear-gradient(90deg, rgba(83, 83, 83, 0.10), transparent 27%);
      mix-blend-mode: multiply;
    }


    @media (max-width: 720px) {
      .hud {
        letter-spacing: 0.08em;
      }

      .title {
        left: 50%;
        top: calc(env(safe-area-inset-top, 0px) + 12px);
        transform: translateX(-50%);
        width: 92vw;
        font-size: clamp(14px, 4.2vw, 20px);
        letter-spacing: 0.15em;
        text-align: center;
        white-space: nowrap;
      }

      .goal {
        top: calc(env(safe-area-inset-top, 0px) + 44px);
        font-size: clamp(17px, 5vw, 24px);
        letter-spacing: 0.08em;
        padding: 4px 10px 5px;
        white-space: nowrap;
      }

      .score {
        left: 50%;
        right: auto;
        top: calc(env(safe-area-inset-top, 0px) + 86px);
        transform: translateX(-50%);
        width: 100%;
        font-size: clamp(12px, 3.7vw, 17px);
        letter-spacing: 0.08em;
        text-align: center;
        white-space: pre;
      }

      .hint {
        bottom: calc(env(safe-area-inset-bottom, 0px) + 74px);
        width: 100%;
        font-size: clamp(12px, 3.7vw, 16px);
        letter-spacing: 0.14em;
      }
    }

    @media (max-width: 420px) {
      .title {
        top: calc(env(safe-area-inset-top, 0px) + 10px);
        font-size: clamp(13px, 3.9vw, 16px);
        letter-spacing: 0.12em;
      }

      .goal {
        top: calc(env(safe-area-inset-top, 0px) + 38px);
        font-size: clamp(16px, 4.7vw, 20px);
        letter-spacing: 0.06em;
      }

      .score {
        top: calc(env(safe-area-inset-top, 0px) + 76px);
        font-size: clamp(11px, 3.4vw, 14px);
        letter-spacing: 0.06em;
      }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="ready runner one"></canvas>
  <div class="hud" aria-hidden="true">
    <div class="title">READY RUNNER ONE</div>
    <div class="goal">GOAL 10000</div>
    <div class="score" id="scoreBox">HI 00000  00000</div>
    <div class="hint" id="hint">PRESS SPACE</div>
  </div>
  <div class="fade" id="fade"></div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d", { alpha: false });
      const scoreBox = document.getElementById("scoreBox");
      const hint = document.getElementById("hint");
      const fade = document.getElementById("fade");

      const BG = "#f7f7f7";
      const INK = "#535353";
      const SOFT = "#8f8f8f";
      const LIGHT = "#b7b7b7";
      const GOAL = 10000;
      const DANGER_SCORE = 7600;
      const FIREWALL_SCORE = 8700;
      const TELEPORT_TARGET_SCORE = 9900;
      const TELEPORT_NEED = 4.5;
      const INTRO_TELEPORT_NEED = 4.5;
      const BASE_SPEED = 285;
      const MAX_SPEED = 920;
      const POST_TELEPORT_SPEED = 520;
      const SCORE_BASE = 1.25;
      const SCORE_SPEED_BONUS = 18;
      const GRAVITY_BASE = 2150;
      const JUMP_BASE = -745;

      const DINO_SPRITE = [
        "      ########        ",
        "     ##########       ",
        "    ############      ",
        "    #############     ",
        "    ##############    ",
        "    #########E####    ",
        "    ##############    ",
        "    ##############    ",
        "    #############     ",
        "  ##############      ",
        " ################     ",
        "################      ",
        " ###############      ",
        "  ##############      ",
        "   ############       ",
        "    ##########        ",
        "     ########         ",
        "     ########         ",
        "     #####  ###       ",
        "    #####   ####      ",
        "    ####     ###      ",
        "    ####     ####     ",
        "   #####     #####    ",
        "   ###        ###     "
      ];
      const DINO_COLS = DINO_SPRITE[0].length;
      const DINO_ROWS = DINO_SPRITE.length;

      const keys = Object.create(null);
      const dino = {
        x: 0,
        y: 0,
        w: 44,
        h: 47,
        vy: 0,
        ground: true,
        step: 0,
        portalScale: 1
      };

      let W = 0;
      let H = 0;
      let DPR = 1;
      let S = 1;
      let GROUND = 0;
      let START_X = 0;
      let MIN_X = 0;
      let GRAVITY = GRAVITY_BASE;
      let JUMP = JUMP_BASE;

      let state = "intro";
      let last = performance.now();
      let runTime = 0;
      let score = 0;
      let high = Number(localStorage.getItem("ready-runner-one-hi") || 0);
      let speed = BASE_SPEED;
      let groundOffset = 0;
      let nextSpawn = 1.0;
      let shake = 0;
      let rewindCharge = 0;
      let portalTimer = 0;
      let portal = null;
      let portalSource = "play";
      let teleported = false;
      let postTeleportTime = 0;
      let endingTimer = 0;
      let firewall = null;
      let prize = null;
      let clouds = [];
      let obstacles = [];
      let dust = [];
      let sparks = [];
      let groundBits = [];

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function rnd(min, max) {
        return min + Math.random() * (max - min);
      }

      function dinoUnit() {
        return Math.max(2, Math.round(2 * S));
      }

      function rects(a, b) {
        return a.x < b.x + b.w &&
          a.x + a.w > b.x &&
          a.y < b.y + b.h &&
          a.y + a.h > b.y;
      }

      function px(x, y, w, h, color = INK) {
        ctx.fillStyle = color;
        ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
      }

      function resize() {
        DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        W = Math.max(320, Math.floor(window.innerWidth));
        H = Math.max(240, Math.floor(window.innerHeight));
        canvas.width = Math.floor(W * DPR);
        canvas.height = Math.floor(H * DPR);
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        ctx.imageSmoothingEnabled = false;

        S = clamp(Math.min(W / 920, H / 430), 0.8, 2.4);
        GROUND = Math.round(H * 0.70);
        START_X = Math.round(W * 0.18);
        MIN_X = Math.round(W * 0.045);
        GRAVITY = GRAVITY_BASE * S;
        JUMP = JUMP_BASE * S;
        const u = dinoUnit();
        dino.w = DINO_COLS * u;
        dino.h = DINO_ROWS * u;

        if (state === "intro") {
          dino.x = clamp(dino.x || START_X, MIN_X, START_X);
          dino.y = GROUND - dino.h;
          dino.vy = 0;
          dino.ground = true;
        } else if (dino.ground || dino.y > GROUND - dino.h) {
          dino.y = GROUND - dino.h;
        }

        makeGroundBits();
        if (!clouds.length) {
          for (let i = 0; i < 7; i++) spawnCloud(rnd(60, W + 320));
        }
      }

      function makeGroundBits() {
        groundBits = [];
        const step = 32 * S;
        const count = Math.ceil(W / step) + 10;
        for (let i = 0; i < count; i++) {
          groundBits.push({
            x: i * step + rnd(-9, 9) * S,
            y: GROUND + rnd(8, 27) * S,
            w: (Math.random() < 0.72 ? rnd(8, 22) : rnd(2, 7)) * S
          });
        }
      }

      function setScoreText() {
        const s = String(Math.floor(Math.min(score, GOAL))).padStart(5, "0");
        const h = String(Math.floor(Math.max(high, score))).padStart(5, "0");
        scoreBox.textContent = `HI ${h}  ${s}`;
      }

      function clearRewindEffects() {
        if (state !== "portal" && state !== "win") {
          rewindCharge = 0;
          fade.style.opacity = "0";
          sparks = sparks.filter(sp => sp.kind !== "rewind");
          if (portal && portal.preview) portal = null;
        }
      }

      function isBackCode(code) {
        return code === "ArrowLeft" || code === "KeyA";
      }

      function setKey(code, value) {
        if (code === "Space") keys.Space = value;
        if (isBackCode(code)) keys.Back = value;
      }

      function startGame() {
        const keepX = clamp(dino.x || START_X, MIN_X, START_X);
        const savedRewindCharge = keys.Back ? rewindCharge : 0;
        const introDepth = clamp((START_X - keepX) / Math.max(1, START_X - MIN_X), 0, 1);
        if (keys.Back && savedRewindCharge >= INTRO_TELEPORT_NEED && introDepth > 0.55) {
          openPortal("intro");
          return;
        }
        state = "play";
        runTime = 0;
        score = 0;
        speed = BASE_SPEED * S;
        groundOffset = 0;
        nextSpawn = 0.85;
        shake = 0;
        rewindCharge = savedRewindCharge;
        portalTimer = 0;
        portal = null;
        portalSource = "play";
        teleported = false;
        postTeleportTime = 0;
        endingTimer = 0;
        firewall = null;
        prize = null;
        obstacles = [];
        dust = [];
        sparks = [];
        clouds = [];
        for (let i = 0; i < 7; i++) spawnCloud(rnd(80, W + 360));
        makeGroundBits();
        dino.x = keepX;
        dino.y = GROUND - dino.h;
        dino.vy = JUMP * 0.72;
        dino.ground = false;
        dino.step = 0;
        dino.portalScale = 1;
        hint.textContent = "";
        fade.style.opacity = "0";
      }

      function die() {
        if (state !== "play") return;
        state = "dead";
        shake = 9 * S;
        high = Math.max(high, Math.floor(score));
        localStorage.setItem("ready-runner-one-hi", String(high));
        hint.textContent = "PRESS SPACE";
        clearRewindEffects();
      }

      function jump() {
        if (state !== "play" || !dino.ground) return;
        dino.vy = JUMP;
        dino.ground = false;
      }

      function openPortal(source = state) {
        if (state !== "play" && state !== "intro") return;
        portalSource = source;
        state = "portal";
        portalTimer = 0;
        shake = Math.max(shake, 5 * S);
        portal = {
          x: clamp(dino.x + dino.w + 76 * S, dino.x + dino.w + 42 * S, W - 82 * S),
          y: clamp(dino.y + dino.h * 0.50, 84 * S, GROUND - 25 * S),
          r: 10 * S,
          preview: false
        };
        hint.textContent = "";
      }

      function win() {
        state = "win";
        score = GOAL;
        speed = POST_TELEPORT_SPEED * S;
        high = Math.max(high, GOAL);
        localStorage.setItem("ready-runner-one-hi", String(high));
        hint.textContent = "PRESS SPACE";
        fade.style.opacity = "0";
        endingTimer = 0;
        portal = null;
        sparks = [];
        setScoreText();
      }

      window.addEventListener("keydown", (e) => {
        const controlled = e.code === "Space" || isBackCode(e.code);
        const blockedNavigation = e.code.startsWith("Arrow");
        if (controlled || blockedNavigation) e.preventDefault();

        setKey(e.code, true);

        if (e.code === "Space") {
          if (state === "intro" || state === "dead" || state === "win") {
            startGame();
          } else if (state === "play") {
            jump();
          }
        }
      }, { passive: false });

      window.addEventListener("keyup", (e) => {
        setKey(e.code, false);
        if (isBackCode(e.code)) clearRewindEffects();
      });

      window.addEventListener("blur", () => {
        keys.Space = false;
        keys.Back = false;
        clearRewindEffects();
      });

      window.addEventListener("pointerdown", (e) => {
        if (e.pointerType !== "touch") return;
        e.preventDefault();
        if (e.clientX < W * 0.38) {
          keys.Back = true;
          return;
        }
        if (state === "intro" || state === "dead" || state === "win") {
          startGame();
        } else if (state === "play") {
          jump();
        }
      }, { passive: false });

      window.addEventListener("pointerup", (e) => {
        if (e.pointerType !== "touch") return;
        keys.Back = false;
        clearRewindEffects();
      }, { passive: true });

      window.addEventListener("pointercancel", (e) => {
        if (e.pointerType !== "touch") return;
        keys.Back = false;
        clearRewindEffects();
      }, { passive: true });

      window.addEventListener("resize", resize);

      function spawnCloud(x = W + rnd(0, 180 * S)) {
        clouds.push({
          x,
          y: rnd(72, Math.max(92, H * 0.34)),
          s: rnd(0.7, 1.35) * S,
          v: rnd(8, 23) * S
        });
      }

      function spawnPostTeleportPrize() {
        if (prize) return;
        prize = {
          x: W + 130 * S,
          y: GROUND - 122 * S,
          w: 98 * S,
          h: 34 * S,
          collected: false
        };
      }

      function resetPrizePosition() {
        if (!prize || prize.collected) return;
        const centerX = W / 2;
        prize.x = centerX - prize.w / 2;
      }

      function spawnCactusCluster() {
        if (teleported && score > 9950) return;
        if (teleported && postTeleportTime > 4.5) return;
        const progress = clamp(score / GOAL, 0, 1);
        const brutal = progress > 0.72;
        const insane = progress > 0.84;
        const baseX = W + 42 * S;
        let clusters = 1;
        let count = 1;

        if (teleported) {
          count = Math.random() < 0.5 ? 1 : 2;
          clusters = 1;
        } else if (progress < 0.25) {
          count = Math.random() < 0.22 ? 2 : 1;
        } else if (progress < 0.55) {
          count = Math.random() < 0.55 ? 2 : 3;
        } else if (progress < 0.72) {
          count = Math.random() < 0.45 ? 3 : 4;
          clusters = Math.random() < 0.55 ? 2 : 1;
        } else if (progress < 0.84) {
          count = Math.random() < 0.55 ? 4 : 5;
          clusters = 2;
        } else {
          count = Math.random() < 0.55 ? 6 : 7;
          clusters = 3;
        }

        for (let i = 0; i < clusters; i++) {
          const h = rnd(38 + progress * 18, 60 + progress * 31) * S;
          const gap = insane ? rnd(42, 67) * S : brutal ? rnd(55, 86) * S : rnd(96, 150) * S;
          const c = Math.max(1, count - (Math.random() < 0.45 ? i : 0));
          obstacles.push({
            x: baseX + i * gap,
            y: GROUND - h,
            w: (17 + c * 18) * S,
            h,
            count: c,
            type: "cactus"
          });
        }
      }

      function spawnFirewall() {
        if (firewall || teleported) return;
        firewall = {
          x: W + 105 * S,
          y: 64 * S,
          w: 42 * S,
          h: GROUND - 64 * S,
          t: 0
        };
      }

      function addRewindSpark() {
        sparks.push({
          kind: "rewind",
          x: dino.x + rnd(-36, 28) * S,
          y: dino.y + rnd(5, dino.h - 4),
          vx: rnd(-90, 40) * S,
          vy: rnd(-22, 22) * S,
          s: rnd(2, 5) * S,
          life: rnd(0.24, 0.55),
          max: 0.55
        });
      }

      function updateIntro(dt) {
        if (keys.Back) {
          dino.x = Math.max(MIN_X, dino.x - 58 * S * dt);
          rewindCharge = Math.min(INTRO_TELEPORT_NEED, rewindCharge + dt);
          if (Math.random() < dt * 17) addRewindSpark();
          const depth = clamp((START_X - dino.x) / Math.max(1, START_X - MIN_X), 0, 1);
          fade.style.opacity = String(Math.min(0.28, depth * 0.28));
          if (rewindCharge >= INTRO_TELEPORT_NEED && depth > 0.55) openPortal("intro");
        } else {
          dino.x += (START_X - dino.x) * Math.min(1, dt * 5.2);
          clearRewindEffects();
        }
        for (const c of clouds) c.x -= c.v * dt * 0.18;
        for (const c of clouds) if (c.x < -120 * S) c.x = W + rnd(20, 180 * S);
        dino.step += dt * 2;
      }

      function updatePortal(dt) {
        portalTimer += dt;
        const p = clamp(portalTimer / 1.35, 0, 1);
        if (portal) {
          portal.r = (12 + p * 52) * S;
          const tx = portal.x - dino.w * 0.46;
          const ty = portal.y - dino.h * 0.50;
          dino.x += (tx - dino.x) * Math.min(1, dt * (2.6 + p * 6.0));
          dino.y += (ty - dino.y) * Math.min(1, dt * (2.2 + p * 6.5));
          dino.portalScale = Math.max(0.18, 1 - p * 0.82);
        }
        shake = Math.max(shake, (1 - p) * 8 * S);
        if (Math.random() < dt * 40) addRewindSpark();

        if (portalTimer >= 1.35) {
          state = "play";
          teleported = true;
          postTeleportTime = 0;
          score = TELEPORT_TARGET_SCORE;
          speed = POST_TELEPORT_SPEED * S;
          groundOffset = 0;
          rewindCharge = 0;
          portal = null;
          firewall = null;
          obstacles = [];
          sparks = [];
          dust = [];
          dino.x = START_X;
          dino.y = GROUND - dino.h;
          dino.vy = 0;
          dino.ground = true;
          dino.portalScale = 1;
          nextSpawn = 0.55;
          fade.style.opacity = "0";
          if (portalSource === "intro") runTime = 0;
        }
      }

      function updatePlay(dt) {
        runTime += dt;
        if (teleported) postTeleportTime += dt;
        const progress = clamp(score / GOAL, 0, 1);
        if (teleported) {
          const finalProgress = clamp((score - TELEPORT_TARGET_SCORE) / (GOAL - TELEPORT_TARGET_SCORE), 0, 1);
          speed = (POST_TELEPORT_SPEED - finalProgress * 240) * S;
          speed = Math.max(210 * S, speed);
        } else {
          speed = (BASE_SPEED + progress * (MAX_SPEED - BASE_SPEED) + Math.min(190, runTime * 7.5)) * S;
        }

        if (score >= GOAL - 18) {
          speed = Math.min(speed, 245 * S);
        }

        const scoreRate = SCORE_BASE + SCORE_SPEED_BONUS * clamp((speed / S - BASE_SPEED) / (MAX_SPEED - BASE_SPEED), 0, 1);
        score += dt * scoreRate;
        if (teleported && score > 9978) {
          score += dt * 5.2;
        }
        if (score > GOAL) score = GOAL;
        setScoreText();

        groundOffset = (groundOffset + speed * dt) % Math.max(1, W + 140 * S);

        if (keys.Back && !teleported) {
          dino.x = Math.max(MIN_X, dino.x - 62 * S * dt);
          rewindCharge = Math.min(TELEPORT_NEED, rewindCharge + dt);
          if (Math.random() < dt * 24) addRewindSpark();
          fade.style.opacity = String(Math.min(0.34, rewindCharge / TELEPORT_NEED * 0.34));
          const depth = clamp((START_X - dino.x) / Math.max(1, START_X - MIN_X), 0, 1);
          if (rewindCharge >= TELEPORT_NEED && depth > 0.42) openPortal("play");
          return;
        } else if (!keys.Back && !teleported) {
          dino.x += (START_X - dino.x) * Math.min(1, dt * 4.8);
          if (rewindCharge > 0) clearRewindEffects();
        } else if (teleported) {
          dino.x += (START_X - dino.x) * Math.min(1, dt * 4.2);
          fade.style.opacity = "0";
        }

        dino.vy += GRAVITY * dt;
        dino.y += dino.vy * dt;
        if (dino.y >= GROUND - dino.h) {
          dino.y = GROUND - dino.h;
          dino.vy = 0;
          dino.ground = true;
        } else {
          dino.ground = false;
        }

        dino.step += dt * (dino.ground ? speed / (58 * S) : 1.7);

        if (!teleported && score > FIREWALL_SCORE) spawnFirewall();
        if (firewall) {
          firewall.x -= speed * dt * 0.92;
          firewall.t += dt;
          const wallBox = { x: firewall.x + 5 * S, y: firewall.y, w: firewall.w - 10 * S, h: firewall.h };
          const dinoBox = hitbox();
          if (rects(dinoBox, wallBox) || score >= GOAL + 20) {
            die();
            return;
          }
        }

        if (teleported && score >= 9934) spawnPostTeleportPrize();
        if (teleported && score >= 9982) resetPrizePosition();

        nextSpawn -= dt;
        if (!firewall && nextSpawn <= 0) {
          spawnCactusCluster();
          const density = clamp(score / GOAL, 0, 1);
          const fast = clamp((speed / S - BASE_SPEED) / (MAX_SPEED - BASE_SPEED), 0, 1);
          nextSpawn = rnd(0.95, 1.75) * (1 - density * 0.44) * (1 - fast * 0.22);
          if (score > DANGER_SCORE) nextSpawn *= 0.55;
          if (teleported) nextSpawn = rnd(1.1, 1.9);
        }

        if (clouds.length < 8 && Math.random() < dt * 0.8) spawnCloud();
        for (const c of clouds) c.x -= c.v * dt;
        clouds = clouds.filter(c => c.x > -130 * S);

        for (const ob of obstacles) ob.x -= speed * dt;
        if (teleported && score > 9976) {
          obstacles = obstacles.filter(ob => ob.x < dino.x - 80 * S || ob.x > W + 80 * S);
        } else {
          obstacles = obstacles.filter(ob => ob.x > -170 * S);
        }

        if (prize && !prize.collected) {
          if (score < 9982) prize.x -= speed * dt * 0.68;
          const keyBox = {
            x: prize.x,
            y: prize.y - 16 * S,
            w: prize.w,
            h: prize.h + 24 * S
          };
          if (score >= GOAL || rects(hitbox(), keyBox)) {
            prize.collected = true;
            win();
            return;
          }
        }

        const dinoBox = hitbox();
        for (const ob of obstacles) {
          const box = {
            x: ob.x + 4 * S,
            y: ob.y + 5 * S,
            w: ob.w - 8 * S,
            h: ob.h - 7 * S
          };
          if (rects(dinoBox, box)) {
            die();
            return;
          }
        }

        if (dino.ground && Math.random() < dt * 16) {
          dust.push({
            x: dino.x + 5 * S,
            y: GROUND + 3 * S,
            s: rnd(2, 4) * S,
            life: rnd(0.18, 0.42)
          });
        }
      }

      function updateParticles(dt) {
        dust.forEach(p => {
          p.x -= speed * dt * 0.55;
          p.life -= dt;
        });
        dust = dust.filter(p => p.life > 0);

        sparks.forEach(sp => {
          sp.x += sp.vx * dt;
          sp.y += sp.vy * dt;
          sp.life -= dt;
        });
        sparks = sparks.filter(sp => sp.life > 0);
      }

      function hitbox() {
        return {
          x: dino.x + dino.w * 0.22,
          y: dino.y + dino.h * 0.14,
          w: dino.w * 0.55,
          h: dino.h * 0.80
        };
      }

      function drawDino() {
        const u = dinoUnit() * dino.portalScale;
        const wobble = state === "portal" ? Math.sin(portalTimer * 24) * 2 * S : 0;
        const leg = Math.floor(dino.step * 9) % 2;
        const x0 = dino.x + wobble;
        const y0 = dino.y + (1 - dino.portalScale) * dino.h * 0.45;

        ctx.save();
        ctx.globalAlpha = state === "portal" ? Math.max(0.25, dino.portalScale) : 1;
        for (let row = 0; row < DINO_ROWS; row++) {
          for (let col = 0; col < DINO_COLS; col++) {
            const cell = DINO_SPRITE[row][col];
            if (cell === "#") {
              px(x0 + col * u, y0 + row * u, u, u, INK);
            } else if (cell === "E") {
              px(x0 + col * u, y0 + row * u, u, u, "#f7f7f7");
            }
          }
        }

        const footY = y0 + 23 * u;
        if (state === "play" && dino.ground) {
          if (leg === 0) {
            px(x0 + 5 * u, footY, 5 * u, u, INK);
            px(x0 + 14 * u, footY, 2 * u, u, INK);
          } else {
            px(x0 + 7 * u, footY, 2 * u, u, INK);
            px(x0 + 13 * u, footY, 5 * u, u, INK);
          }
        }
        ctx.restore();
      }

      function drawCloud(c) {
        const s = c.s;
        px(c.x, c.y + 18 * s, 76 * s, 5 * s, LIGHT);
        px(c.x + 11 * s, c.y + 11 * s, 18 * s, 5 * s, LIGHT);
        px(c.x + 28 * s, c.y + 6 * s, 23 * s, 5 * s, LIGHT);
        px(c.x + 49 * s, c.y + 12 * s, 19 * s, 5 * s, LIGHT);
        px(c.x + 20 * s, c.y + 23 * s, 50 * s, 4 * s, LIGHT);
      }

      function drawCactus(ob) {
        const count = ob.count || 1;
        const unitW = ob.w / Math.max(1, count);
        for (let i = 0; i < count; i++) {
          const x = ob.x + i * unitW + unitW * 0.22;
          const h = ob.h * (0.82 + (i % 2) * 0.16);
          const y = GROUND - h;
          const stem = Math.max(8 * S, unitW * 0.34);
          const arm = Math.max(6 * S, stem * 0.70);
          px(x, y, stem, h, INK);
          px(x - arm, y + h * 0.35, arm, stem, INK);
          px(x - arm, y + h * 0.35 - stem * 1.2, stem, stem * 1.6, INK);
          px(x + stem, y + h * 0.52, arm, stem, INK);
          px(x + stem + arm - stem, y + h * 0.52 - stem * 1.2, stem, stem * 1.6, INK);
        }
      }

      function drawFirewall() {
        if (!firewall) return;
        ctx.save();
        ctx.globalAlpha = 0.86 + Math.sin(firewall.t * 17) * 0.10;
        const x = firewall.x;
        px(x, firewall.y, firewall.w, firewall.h, INK);
        for (let y = firewall.y + 13 * S; y < firewall.y + firewall.h; y += 24 * S) {
          px(x - 15 * S, y, 18 * S, 3 * S, INK);
          px(x + firewall.w - 2 * S, y + 9 * S, 16 * S, 3 * S, INK);
        }
        ctx.restore();
      }

      function drawPrize() {
        if (!prize || prize.collected) return;
        const x = prize.x;
        const y = prize.y;
        ctx.save();
        ctx.globalAlpha = 0.85 + Math.sin(runTime * 8) * 0.10;
        px(x, y, 25 * S, 25 * S, INK);
        px(x + 25 * S, y + 9 * S, 66 * S, 8 * S, INK);
        px(x + 88 * S, y + 17 * S, 7 * S, 16 * S, INK);
        px(x + 61 * S, y + 17 * S, 7 * S, 13 * S, INK);
        px(x + 30 * S, y + 12 * S, 65 * S, 3 * S, SOFT);
        ctx.restore();
      }

      function drawGround() {
        ctx.strokeStyle = INK;
        ctx.lineWidth = Math.max(2, 3 * S);
        ctx.beginPath();
        ctx.moveTo(0, GROUND + 0.5);
        ctx.lineTo(W, GROUND + 0.5);
        ctx.stroke();

        const track = Math.max(1, W + 140 * S);
        for (const b of groundBits) {
          let x = b.x - groundOffset;
          if (x < -55 * S) x += track;
          px(x, b.y, b.w, Math.max(2, 2 * S), SOFT);
        }
      }

      function drawDust() {
        for (const p of dust) {
          ctx.globalAlpha = Math.max(0, p.life * 3.2);
          px(p.x, p.y, p.s, p.s, SOFT);
          ctx.globalAlpha = 1;
        }
      }

      function drawSparks() {
        for (const sp of sparks) {
          ctx.globalAlpha = Math.max(0, sp.life / sp.max);
          px(sp.x, sp.y, sp.s, sp.s, INK);
          ctx.globalAlpha = 1;
        }
      }

      function drawPortal() {
        if (!portal) return;
        ctx.save();
        ctx.globalAlpha = state === "portal" ? 0.88 : 0.30;
        for (let i = 0; i < 11; i++) {
          ctx.strokeStyle = i % 2 ? SOFT : INK;
          ctx.lineWidth = Math.max(1, (1 + i * 0.20) * S);
          ctx.beginPath();
          ctx.ellipse(
            portal.x,
            portal.y,
            portal.r + i * 5.4 * S + Math.sin(portalTimer * 8 + i) * 2 * S,
            portal.r * 1.38 + i * 3.6 * S,
            0,
            0,
            Math.PI * 2
          );
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawRewindNoise() {
        if (state !== "portal" && (!keys.Back || rewindCharge <= 0.04)) return;
        const amount = state === "portal" ? 0.50 : Math.min(0.34, rewindCharge / TELEPORT_NEED * 0.34);
        ctx.save();
        ctx.globalAlpha = amount;
        for (let i = 0; i < 15; i++) {
          px(rnd(0, START_X + 18 * S), rnd(78 * S, GROUND + 10 * S), rnd(8, 52) * S, Math.max(1, S), INK);
        }
        ctx.restore();
      }

      function drawKeyShape(cx, cy, scale, color, shade = null) {
        const s = scale * S;
        px(cx - 106 * s, cy - 15 * s, 32 * s, 32 * s, color);
        px(cx - 73 * s, cy - 4 * s, 70 * s, 9 * s, color);
        px(cx - 2 * s, cy - 3 * s, 25 * s, 9 * s, shade || color);
        px(cx + 23 * s, cy - 4 * s, 78 * s, 9 * s, shade || color);
        px(cx + 96 * s, cy + 5 * s, 9 * s, 22 * s, shade || color);
        px(cx + 45 * s, cy + 5 * s, 9 * s, 18 * s, shade || color);
      }

      function drawWinPanel() {
        const t = endingTimer;
        const w = Math.min(W * 0.68, 600 * S);
        const h = Math.min(H * 0.42, 260 * S);
        const x = (W - w) / 2;
        const y = Math.max(96 * S, H * 0.30 - h * 0.42);
        ctx.save();
        ctx.globalAlpha = Math.min(1, t * 1.7);
        ctx.fillStyle = BG;
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = INK;
        ctx.lineWidth = Math.max(2, 3 * S);
        ctx.strokeRect(x, y, w, h);

        ctx.textAlign = "center";
        ctx.fillStyle = INK;
        ctx.font = `${Math.round(34 * S)}px Consolas, monospace`;
        ctx.fillText("FIRST KEY FOUND", W / 2, y + 66 * S);

        const keyY = y + 136 * S;
        drawKeyShape(W / 2 - 156 * S, keyY, 0.60, INK);
        drawKeyShape(W / 2, keyY, 0.60, SOFT, SOFT);
        drawKeyShape(W / 2 + 156 * S, keyY, 0.60, SOFT, SOFT);

        ctx.font = `${Math.round(20 * S)}px Consolas, monospace`;
        ctx.fillStyle = INK;
        ctx.fillText("OASIS ACCESS GRANTED", W / 2, y + 194 * S);
        ctx.font = `${Math.round(12 * S)}px Consolas, monospace`;
        ctx.fillStyle = SOFT;
        ctx.fillText("ANORAK WAS HERE", W / 2, y + 232 * S);
        ctx.restore();
      }

      function drawMessage() {
        if (state === "dead") {
          ctx.fillStyle = INK;
          ctx.textAlign = "center";
          ctx.font = `${Math.round(30 * S)}px Consolas, monospace`;
          ctx.fillText("GAME OVER", W / 2, H * 0.42);
          return;
        }

        if (state === "win") {
          drawWinPanel();
        }
      }

      function draw() {
        ctx.save();
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        if (shake > 0.1) {
          ctx.translate(rnd(-shake, shake), rnd(-shake * 0.4, shake * 0.4));
        }
        for (const c of clouds) drawCloud(c);
        drawRewindNoise();
        drawPortal();
        drawPrize();
        drawGround();
        drawDust();
        for (const ob of obstacles) drawCactus(ob);
        drawFirewall();
        drawDino();
        drawSparks();
        drawMessage();
        ctx.restore();
      }

      function update(dt) {
        if (state === "intro") updateIntro(dt);
        else if (state === "play") updatePlay(dt);
        else if (state === "portal") updatePortal(dt);
        else if (state === "win") {
          endingTimer += dt;
          for (const c of clouds) c.x -= c.v * dt * 0.14;
          for (const c of clouds) if (c.x < -120 * S) c.x = W + rnd(20, 180 * S);
        }
        if (state === "play" || state === "portal") updateParticles(dt);
        shake *= Math.pow(0.02, dt);
        if (state !== "dead") setScoreText();
      }

      function loop(now) {
        const dt = Math.min(0.033, Math.max(0, (now - last) / 1000));
        last = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      resize();
      setScoreText();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
